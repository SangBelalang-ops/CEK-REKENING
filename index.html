<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TERSNACKS.ID - SPRING GARDEN</title>
    <style>
        :root { 
            /* TEMA SPRING NATURE */
            --primary: #2ecc71; /* Fresh Green */
            --secondary: #a8e063; /* Sage Green */
            --glass: rgba(255, 255, 255, 0.9); /* Clean White Glass */
            --dark: #1b4d3e; /* Deep Forest Green */
            --success: #27ae60;
            --danger: #e74c3c;
        }
        body { 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            margin: 0; background: #f0fff4; color: var(--dark); 
            text-align: center; padding-bottom: 50px; overflow-x: hidden; 
        }

        #rainCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
            background: linear-gradient(to bottom, #f0fff4 0%, #dcfce7 100%);
        }

        header { 
            position: relative; 
            z-index: 10; padding: 45px 10px; 
            background: var(--glass); border-bottom: 3px solid var(--primary); 
            box-shadow: 0 4px 15px rgba(46, 204, 113, 0.1);
            backdrop-filter: blur(10px);
        }
        
        .logo-header { 
            width: 280px; margin-bottom: 10px; 
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.1)); 
        }
        
        header p { 
            margin: 0; font-size: 0.85em; font-weight: 900; 
            letter-spacing: 3px; color: var(--dark); 
            position: relative;
            display: inline-block;
            background: linear-gradient(90deg, var(--dark), var(--primary), var(--dark));
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 4s linear infinite;
        }

        @keyframes shine {
            to { background-position: 200% center; }
        }

        .kentang-left, .kentang-right {
            position: absolute;
            bottom: -5px;      
            width: 130px; 
            z-index: 11;
            pointer-events: none;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1));
        }
        .kentang-left { left: 10px; }
        .kentang-right { right: 10px; }

        .grid { 
            display: grid; 
            grid-template-columns: repeat(4, 1fr); 
            gap: 15px; 
            padding: 20px; 
            max-width: 1000px; 
            margin: 0 auto; 
            position: relative; 
            z-index: 10; 
        }
        
        .card { 
            background: white; border-radius: 25px; overflow: hidden; 
            border: 1px solid rgba(46, 204, 113, 0.2); position: relative; 
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
        }
        .card:hover { 
            transform: translateY(-10px) scale(1.03);
            box-shadow: 0 15px 30px rgba(46, 204, 113, 0.2);
            border-color: var(--primary);
        }
        .card img { width: 100%; height: 130px; object-fit: cover; }
        
        .sold-out-overlay { 
            position: absolute; top: 0; left: 0; width: 100%; height: 130px; 
            background: rgba(255,255,255,0.8); display: none; align-items: center; 
            justify-content: center; z-index: 5;
        }
        .is-empty .sold-out-overlay { display: flex; }

        .so-text { 
            color: white; background: var(--danger); padding: 5px 15px; 
            font-weight: 900; transform: rotate(-15deg); 
            border-radius: 50px; font-size: 0.8em; 
        }

        .card-info { padding: 15px; }
        .card-name { 
            font-size: 0.75em; font-weight: 800; color: var(--dark); 
            height: 35px; display: flex; align-items: center; 
            justify-content: center; text-transform: uppercase; 
        }
        
        .stock-tag { 
            font-size: 0.65em; color: var(--primary); 
            background: #f0fff4; border-radius: 50px; 
            padding: 4px 12px; display: inline-block; 
            margin-bottom: 10px; font-weight: 900; border: 1px solid var(--primary);
        }

        .counter { display: flex; justify-content: center; align-items: center; gap: 8px; }
        .btn-qty { 
            background: white; border: 2px solid var(--primary); 
            width: 32px; height: 32px; border-radius: 50%; color: var(--primary); 
            cursor: pointer; font-weight: bold; transition: 0.2s;
        }
        .btn-qty:hover:not(:disabled) { background: var(--primary); color: white; }
        .btn-qty:disabled { opacity: 0.3; cursor: not-allowed; border-color: #ccc; color: #ccc; }

        #total-bar { 
            position: fixed; bottom: 0; left: 0; right: 0; 
            background: var(--glass); padding: 18px 25px; display: none; 
            justify-content: space-between; align-items: center; 
            border-top: 3px solid var(--primary); z-index: 1000; 
            backdrop-filter: blur(15px);
        }
        .btn-order { 
            background: var(--primary); color: white; border: none; 
            padding: 12px 30px; border-radius: 50px; font-weight: 900; cursor: pointer;
            box-shadow: 0 4px 10px rgba(46, 204, 113, 0.3);
        }

        #payment-area { 
            position: relative; z-index: 10; display:none; padding: 40px 20px; 
            background: white; border-top: 3px solid var(--primary); 
        }
        .input-nama { 
            width: 85%; padding: 15px; border-radius: 50px; 
            border: 2px solid var(--secondary); background: #f9f9f9; 
            color: var(--dark); margin-bottom: 25px; text-align: center; font-weight: 800; 
        }
        
        .pay-options { display: flex; justify-content: center; gap: 15px; margin-bottom: 25px; }
        .opt-btn { 
            background: transparent; border: 2px solid var(--primary); color: var(--primary); 
            padding: 12px 25px; border-radius: 50px; cursor: pointer; font-weight: 900; 
        }
        .opt-btn.active { background: var(--primary); color: white; }

        .final-btn { 
            background: var(--dark); color: white; padding: 18px; 
            border: none; border-radius: 50px; font-weight: 900; 
            width: 90%; cursor: pointer; 
        }

        footer { 
            position: relative; z-index: 10; margin-top: 60px; 
            padding: 50px 20px; border-top: 1px solid rgba(46, 204, 113, 0.1); 
            background: white; 
        }

        @media (max-width: 600px) { 
            .grid { grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 10px; } 
            .kentang-left, .kentang-right { width: 85px; } 
        }
    </style>
</head>
<body>  

<canvas id="rainCanvas"></canvas>

<header>
    <img src="https://i.postimg.cc/T3Dj51gC/download.png" class="logo-header">
    <h2 style="margin:0; font-size: 1.4em; font-weight: 900; color: var(--dark);">TERSNACKS.ID</h2>
    <p>FRESH FROM NATURE • $3.00</p>
    
    <img src="https://i.postimg.cc/wMKm57LB/output-onlinegiftools.gif" class="kentang-left" alt="Kentang">
    <img src="https://i.postimg.cc/T1rdWcrD/output-onlinegiftools-(1).gif" class="kentang-right" alt="Kentang">
</header>

<div id="loading" style="padding: 50px; color: var(--primary); font-weight: 800;">HARVESTING DATA...</div>
<div class="grid" id="container-snack"></div>

<div id="total-bar">
    <div style="text-align:left">
        <div id="summary" style="font-size: 0.65em; color: #666;"></div>
        <div id="display-total" style="font-weight: 900; color: var(--dark); font-size: 1.4em;">$0.00</div>
    </div>
    <button class="btn-order" onclick="openPayment()">ORDER SEKARANG</button>
</div>

<div id="payment-area">
    <h3 style="color: var(--dark); font-weight: 900;">SIAPA NAMA ANDA?</h3>
    <input type="text" id="nama-pembeli" class="input-nama" placeholder="TULIS NAMA DISINI">
    
    <p style="font-size: 0.8em; font-weight: 800; margin-bottom: 15px;">METODE PEMBAYARAN:</p>
    <div class="pay-options">
        <button class="opt-btn" id="btn-riel" onclick="showQR('riel')">RIEL</button>
        <button class="opt-btn" id="btn-usd" onclick="showQR('usd')">USD</button>
    </div>

    <div id="qr-riel" style="display:none; justify-content:center; margin-bottom: 30px;">
        <div style="background: white; padding: 12px; border-radius: 15px; width: 200px; border: 1px solid #eee;">
            <img src="https://i.postimg.cc/xC8S9kSY/83ab8373-93bf-4620-9f16-ed523851faa0.jpg" style="width:100%">
            <div style="color: black; font-size: 0.8em; font-weight: 900; margin-top: 8px;">BARCODE RIEL</div>
        </div>
    </div>

    <div id="qr-usd" style="display:none; justify-content:center; margin-bottom: 30px;">
        <div style="background: white; padding: 12px; border-radius: 15px; width: 200px; border: 1px solid #eee;">
            <img src="https://i.postimg.cc/PJGhKtBT/USD.jpg" style="width:100%">
            <div style="color: black; font-size: 0.8em; font-weight: 900; margin-top: 8px;">BARCODE USD</div>
        </div>
    </div>

    <button id="submit-btn" onclick="sendToSpreadsheet()" class="final-btn">KONFIRMASI PESANAN</button>
</div>

<footer>
    <h3 style="color: var(--primary); letter-spacing: 2px; margin-bottom: 10px; font-weight: 900;">THANK YOU!</h3>
    <div style="color: var(--dark); font-size: 0.9em; font-weight: 700; opacity: 0.8;">NIKMATI SNACK SEGAR DARI TERSNACKS.ID</div>
    <div style="margin-top: 25px; opacity: 0.3; font-size: 0.6em; letter-spacing: 5px;">SPRING EDITION • 2026</div>
</footer>

<script>
    const scriptURL = "https://script.google.com/macros/s/AKfycbykBwYZX2poPZx2-7gxtfnlrg0N5BW29lkdYOKeaelaGapyKi3NHQHUYDMoA1XTGTjO/exec";

    /* ANIMASI KELOPAK & DAUN MELAYANG (SPRING BREEZE) */
    const canvas = document.getElementById('rainCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    let leaves = [];
    const colors = ['#ffffff', '#ffcfe2', '#9ae6b4', '#48bb78']; // Putih, Pink kelopak, Hijau daun

    for (let i = 0; i < 40; i++) {
        leaves.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            size: Math.random() * 6 + 4,
            color: colors[Math.floor(Math.random() * colors.length)],
            speedX: Math.random() * 2 + 1, // Gerak ke kanan (angin)
            speedY: Math.random() * 1 + 0.5,
            angle: Math.random() * 360
        });
    }

    function drawSpring() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        leaves.forEach(l => {
            ctx.save();
            ctx.translate(l.x, l.y);
            ctx.rotate(l.angle * Math.PI / 180);
            ctx.fillStyle = l.color;
            // Gambar bentuk kelopak lonjong
            ctx.beginPath();
            ctx.ellipse(0, 0, l.size, l.size/2, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();

            l.x += l.speedX;
            l.y += l.speedY;
            l.angle += 1;

            if (l.x > canvas.width) l.x = -20;
            if (l.y > canvas.height) l.y = -20;
        });
        requestAnimationFrame(drawSpring);
    }
    drawSpring();

    window.addEventListener('resize', () => {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    });

    let snackData = [
        { id: 0, name: "KACANG TOJIN", stock: 0, img: "https://i.postimg.cc/MZbTnf6L/184f7bee-21ba-4477-81c6-c9f7acfb487a.jpg" },
        { id: 1, name: "KETAWA", stock: 0, img: "https://i.postimg.cc/ncFLBVMD/b95988fe-979d-48c6-891c-900e8f3e42f1.jpg" },
        { id: 2, name: "KACANG TING TING", stock: 0, img: "https://i.postimg.cc/hP2trF7k/ab4902a9-b072-4159-8ebb-3fbf45c8fc0b.jpg" },
        { id: 3, name: "KUE SUS KERING COKLAT", stock: 0, img: "https://i.postimg.cc/nLX3vcfH/5a308155-4a39-40bc-b5ff-6c53942c6446.jpg" },
        { id: 4, name: "MAKARONI", stock: 0, img: "https://i.postimg.cc/9f7XCrgJ/9c04e078-ee93-4550-8310-851e9a34d691.jpg" },
        { id: 5, name: "BASRENG PEDAS", stock: 0, img: "https://i.postimg.cc/gjYGV4z5/601de701-a9b5-4bbf-8aa6-87b171349a64.jpg" },
        { id: 6, name: "LUMPIA", stock: 0, img: "https://i.postimg.cc/ZYcbbkj9/38611567-5f9f-4899-9d33-cffa77b5e469.jpg" },
        { id: 7, name: "KACANG ARAB", stock: 0, img: "https://i.postimg.cc/sDgV1n09/16ad7cba-62a3-48d4-a52c-25fe2f379b5e.jpg" },
        { id: 8, name: "KACANG TELUR", stock: 0, img: "https://i.postimg.cc/nLXR3qKF/a380402e-538b-431d-bc8e-5b332b2fbe5f.jpg" },
        { id: 9, name: "KERIPIK BALADO PADANG", stock: 0, img: "https://i.postimg.cc/7LprzWcc/fc5d75bb-8868-4c74-80b9-289bc86bb0c1.jpg" },
        { id: 10, name: "KUE BAWANG", stock: 0, img: "https://i.postimg.cc/W496fRjy/1904dff8-56e9-48b2-83c4-57a376284b27.jpg" },
        { id: 11, name: "UNTIR UNTIR", stock: 0, img: "https://i.postimg.cc/3Rd6tFMx/09220392-ad87-478d-9fcf-0c67b1ba6cfb.jpg" },
        { id: 12, name: "BASRENG ORIGINAL", stock: 0, img: "https://i.postimg.cc/sxBMf8kX/3428ff40-8068-4717-baf3-0bc8ffe5ef7f.jpg" },
        { id: 13, name: "KERIPIK SIBOLGA", stock: 0, img: "https://i.postimg.cc/jjf59hns/bb339866-ab21-4add-b6b9-fc425b13e4da.jpg" } 
    ];

    let cart = {};

    function init() {
        const s = document.createElement('script');
        s.src = `${scriptURL}?callback=handleData`;
        document.body.appendChild(s);
    }

    function handleData(d) {
        snackData.forEach(s => { 
            if(!s.isCS && d[s.name.toUpperCase()] !== undefined) s.stock = parseInt(d[s.name.toUpperCase()]); 
        });
        document.getElementById('loading').style.display = 'none';
        render();
    }

    function render() {
        const grid = document.getElementById('container-snack');
        grid.innerHTML = '';
        snackData.forEach(s => {
            const soldOut = s.stock <= 0;
            grid.innerHTML += `
                <div class="card ${soldOut ? 'is-empty' : ''}">
                    <div class="sold-out-overlay">
                        <div class="so-text">HABIS</div>
                    </div>
                    <img src="${s.img}">
                    <div class="card-info">
                        <div class="card-name">${s.name}</div>
                        <div class="stock-tag">STOK: ${s.stock}</div>
                        <div class="counter">
                            <button class="btn-qty" onclick="changeQty(${s.id},-1)" ${soldOut ? 'disabled' : ''}>-</button>
                            <span id="qty-${s.id}" style="font-weight:900; min-width:20px;">0</span>
                            <button class="btn-qty" onclick="changeQty(${s.id},1)" ${soldOut ? 'disabled' : ''}>+</button>
                        </div>
                    </div>
                </div>`;
        });
    }

    function changeQty(id, delta) {
        let q = (cart[id] || 0) + delta;
        if(q < 0 || q > (snackData[id].stock || 0)) return;
        cart[id] = q;
        document.getElementById(`qty-${id}`).innerText = q;
        updateTotal();
    }

    function updateTotal() {
        let total = 0; let list = [];
        Object.keys(cart).forEach(id => {
            if(cart[id] > 0) {
                total += cart[id] * 3;
                list.push(`${cart[id]}x ${snackData[id].name}`);
            }
        });
        document.getElementById('total-bar').style.display = total > 0 ? 'flex' : 'none';
        document.getElementById('display-total').innerText = "$" + total.toFixed(2);
        document.getElementById('summary').innerText = list.join(", ");
    }

    function openPayment() { 
        document.getElementById('payment-area').style.display='block'; 
        window.scrollTo({top: document.body.scrollHeight, behavior: 'smooth'}); 
    }

    function showQR(type) {
        document.getElementById('qr-riel').style.display = 'none';
        document.getElementById('qr-usd').style.display = 'none';
        document.getElementById('btn-riel').classList.remove('active');
        document.getElementById('btn-usd').classList.remove('active');
        if(type === 'riel') {
            document.getElementById('qr-riel').style.display = 'flex';
            document.getElementById('btn-riel').classList.add('active');
        } else {
            document.getElementById('qr-usd').style.display = 'flex';
            document.getElementById('btn-usd').classList.add('active');
        }
    }

    function sendToSpreadsheet() {
        const nama = document.getElementById('nama-pembeli').value;
        if(!nama) return alert("NAMA BELUM DIISI!");
        let list = []; let total = 0;
        Object.keys(cart).forEach(id => { if(cart[id] > 0) { total += cart[id] * 3; list.push(`${cart[id]}x ${snackData[id].name}`); } });
        if(list.length === 0) return alert("PILIH PESANAN ANDA!");
        const btn = document.getElementById('submit-btn');
        btn.innerText = "MENGIRIM..."; btn.disabled = true;
        const params = new URLSearchParams();
        params.append('nama', nama);
        params.append('pesanan', list.join(", "));
        params.append('total', "$" + total.toFixed(2));
        fetch(`${scriptURL}?${params.toString()}`, { method: 'GET', mode: 'no-cors' })
        .then(() => { alert("PESANAN TERKIRIM!"); location.reload(); })
        .catch(() => { location.reload(); });
    }
    init();
</script>
</body>
</html>
