<!doctype html>
<html ⚡ lang="id">
<head>
  <meta charset="utf-8">
  <title>The 5 Snack Seasons - Ultimate Coding</title>
  <link rel="canonical" href="https://websitemu.com">
  <meta name="viewport" content="width=device-width,minimum-scale=1,initial-scale=1">
  <script async src="https://cdn.ampproject.org/v0.js"></script>
  <script async custom-element="amp-animation" src="https://cdn.ampproject.org/v0/amp-animation-0.1.js"></script>
  <script async custom-element="amp-carousel" src="https://cdn.ampproject.org/v0/amp-carousel-0.1.js"></script>
  <script async custom-element="amp-bind" src="https://cdn.ampproject.org/v0/amp-bind-0.1.js"></script>

  <style amp-boilerplate>body{-webkit-animation:-amp-start 8s steps(1,end) 0s 1 normal both;-moz-animation:-amp-start 8s steps(1,end) 0s 1 normal both;-ms-animation:-amp-start 8s steps(1,end) 0s 1 normal both;animation:-amp-start 8s steps(1,end) 0s 1 normal both}@-webkit-keyframes -amp-start{from{visibility:hidden}to{visibility:visible}}@-moz-keyframes -amp-start{from{visibility:hidden}to{visibility:visible}}@-ms-keyframes -amp-start{from{visibility:hidden}to{visibility:visible}}@-o-keyframes -amp-start{from{visibility:hidden}to{visibility:visible}}@keyframes -amp-start{from{visibility:hidden}to{visibility:visible}}</style><noscript><style amp-boilerplate>body{-webkit-animation:none;-moz-animation:none;-ms-animation:none;animation:none}</style></noscript>

  <style amp-custom>
    body { font-family: 'Inter', sans-serif; background: #000; margin: 0; overflow: hidden; color: #fff; }
    .viewport { position: relative; height: 100vh; width: 100%; }

    /* --- LAYER 1: BACKGROUND CROSSFADE --- */
    .bg-layer { position: absolute; width: 100%; height: 100%; opacity: 0; transition: opacity 1s; z-index: 1; }
    .bg-active { opacity: 0.5; }

    /* --- LAYER 2: MULTI-SEASON PARTICLE ENGINE --- */
    .particle-box { position: absolute; width: 100%; height: 100%; z-index: 5; pointer-events: none; display: none; }
    .show-effect { display: block; }
    
    .p-item { opacity: 0; }
    .hujan-coklat { fill: #5D4037; }
    .daun-gugur { fill: #FFA000; }
    .salju-gula { fill: #FFFFFF; }
    .badai-pedas { fill: #D32F2F; }
    .cerah-daun { fill: #4CAF50; }

    /* --- LAYER 3: UI & PRODUCT --- */
    .ui-container { position: absolute; width: 100%; height: 100%; z-index: 10; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .main-carousel { width: 100%; height: 50vh; }
    .product-img { filter: drop-shadow(0 20px 40px rgba(0,0,0,0.9)); }
    
    .info-panel { text-align: center; margin-top: 10px; }
    .season-name { background: #fff; color: #000; padding: 4px 12px; border-radius: 20px; font-weight: 900; font-size: 0.7rem; letter-spacing: 2px; }
    .product-title { font-size: 2.5rem; font-weight: 900; margin: 10px 0; text-transform: uppercase; }
    
    .btn-order { background: #FFD700; color: #000; padding: 15px 45px; border-radius: 50px; font-weight: 900; text-decoration: none; display: inline-block; margin-top: 20px; box-shadow: 0 10px 20px rgba(255,215,0,0.3); }
  </style>
</head>
<body>

  <amp-state id="snack">
    <script type="application/json">
      {
        "curr": 0,
        "data": [
          {"name": "Sus Coklat", "env": "HUJAN COKLAT"},
          {"name": "Balado Padang", "env": "BADAI PEDAS"},
          {"name": "Kue Bawang", "env": "DAUN GUGUR"},
          {"name": "Untir Untir", "env": "SALJU GULA"},
          {"name": "Basreng Jeruk", "env": "HARI CERAH"}
        ]
      }
    </script>
  </amp-state>

  <div class="viewport">
    
    <div class="bg-layer" [class]="'bg-layer ' + (snack.curr == 0 ? 'bg-active' : '')"><amp-img src="bg_sus.jpg" layout="fill"></amp-img></div>
    <div class="bg-layer" [class]="'bg-layer ' + (snack.curr == 1 ? 'bg-active' : '')"><amp-img src="bg_balado.jpg" layout="fill"></amp-img></div>
    <div class="bg-layer" [class]="'bg-layer ' + (snack.curr == 2 ? 'bg-active' : '')"><amp-img src="bg_bawang.jpg" layout="fill"></amp-img></div>
    <div class="bg-layer" [class]="'bg-layer ' + (snack.curr == 3 ? 'bg-active' : '')"><amp-img src="bg_untir.jpg" layout="fill"></amp-img></div>
    <div class="bg-layer" [class]="'bg-layer ' + (snack.curr == 4 ? 'bg-active' : '')"><amp-img src="bg_basreng.jpg" layout="fill"></amp-img></div>

    <svg class="viewport" viewBox="0 0 100 100" preserveAspectRatio="none">
      <g class="particle-box" [class]="'particle-box ' + (snack.curr == 0 ? 'show-effect' : '')">
        <circle class="p-item hujan-coklat" cx="15" cy="-5" r="1.5" />
        <circle class="p-item hujan-coklat" cx="45" cy="-15" r="1" />
        <circle class="p-item hujan-coklat" cx="75" cy="-10" r="2" />
      </g>
      <g class="particle-box" [class]="'particle-box ' + (snack.curr == 1 ? 'show-effect' : '')">
        <rect class="p-item badai-pedas" x="20" y="-10" width="1" height="5" transform="rotate(20)" />
        <rect class="p-item badai-pedas" x="50" y="-20" width="1" height="6" transform="rotate(-15)" />
        <rect class="p-item badai-pedas" x="80" y="-5" width="1" height="4" transform="rotate(10)" />
      </g>
      <g class="particle-box" [class]="'particle-box ' + (snack.curr == 2 ? 'show-effect' : '')">
        <path class="p-item daun-gugur" d="M10,-5 Q15,0 10,5 Q5,0 10,-5" />
        <path class="p-item daun-gugur" d="M40,-15 Q45,-10 40,-5 Q35,-10 40,-15" />
        <path class="p-item daun-gugur" d="M70,-10 Q75,-5 70,0 Q65,-5 70,-10" />
      </g>
      <g class="particle-box" [class]="'particle-box ' + (snack.curr == 3 ? 'show-effect' : '')">
        <circle class="p-item salju-gula" cx="25" cy="-5" r="0.5" />
        <circle class="p-item salju-gula" cx="55" cy="-12" r="0.7" />
        <circle class="p-item salju-gula" cx="85" cy="-8" r="0.4" />
      </g>
      <g class="particle-box" [class]="'particle-box ' + (snack.curr == 4 ? 'show-effect' : '')">
        <rect class="p-item cerah-daun" x="30" y="-10" width="2" height="2" rx="1" />
        <rect class="p-item cerah-daun" x="60" y="-15" width="2" height="2" rx="1" />
      </g>
    </svg>

    <div class="ui-container">
      <amp-carousel class="main-carousel" type="slides" layout="fill" autoplay delay="3000"
        on="slideChange:AMP.setState({snack: {curr: event.index}})">
        <div class="slide"><amp-img class="product-img" src="sus.png" width="300" height="300" layout="responsive"></amp-img></div>
        <div class="slide"><amp-img class="product-img" src="balado.png" width="300" height="300" layout="responsive"></amp-img></div>
        <div class="slide"><amp-img class="product-img" src="bawang.png" width="300" height="300" layout="responsive"></amp-img></div>
        <div class="slide"><amp-img class="product-img" src="untir.png" width="300" height="300" layout="responsive"></amp-img></div>
        <div class="slide"><amp-img class="product-img" src="basreng.png" width="300" height="300" layout="responsive"></amp-img></div>
      </amp-carousel>

      <div class="info-panel">
        <span class="season-name" [text]="snack.data[snack.curr].env">HUJAN COKLAT</span>
        <h2 class="product-title" [text]="snack.data[snack.curr].name">Sus Coklat</h2>
        <a href="#" class="btn-order">PESAN SEKARANG</a>
      </div>
    </div>
  </div>

  <amp-animation id="falling" layout="nodisplay" trigger="visibility">
    <script type="application/json">
      {
        "selector": ".p-item",
        "duration": "2.5s",
        "iterations": "infinite",
        "keyframes": [
          { "transform": "translateY(0) rotate(0deg)", "opacity": 0 },
          { "transform": "translateY(100vh) rotate(360deg)", "opacity": 1 }
        ],
        "delay": "rand(0, 2s)"
      }
    </script>
  </amp-animation>

</body>
</html>
