<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Sistem Validasi Rekening Pro</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; justify-content: center; padding-top: 50px; }
        .card { background: white; padding: 35px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 360px; }
        h2 { text-align: center; color: #1a73e8; margin-bottom: 25px; font-size: 18px; text-transform: uppercase; border-bottom: 2px solid #1a73e8; padding-bottom: 10px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: #444; }
        select, input, button { width: 100%; padding: 12px; margin-bottom: 20px; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; font-size: 16px; }
        button { background: #1a73e8; color: white; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #1557b0; }
        #hasil-box { text-align: center; padding: 15px; border-radius: 8px; background: #f8f9fa; border: 1px dashed #bbb; min-height: 50px; }
        .nama-full { color: #1e7e34; font-weight: 800; font-size: 20px; text-transform: uppercase; display: block; margin-top: 5px; }
    </style>
</head>
<body>

<div class="card">
    <h2>VALIDASI REKENING PREMIUM</h2>
    
    <label>Pilih Bank / E-Wallet</label>
    <select id="bank">
        <option value="bca">BCA</option>
        <option value="mandiri">MANDIRI</option>
        <option value="bri">BRI</option>
        <option value="bni">BNI</option>
        <option value="seabank">SEABANK</option>
        <option value="dana">DANA</option>
        <option value="ovo">OVO</option>
        <option value="gopay">GOPAY</option>
    </select>

    <label>Nomor Rekening</label>
    <input type="text" id="norek" placeholder="Contoh: 1234567890">
    
    <button onclick="cekRekening()">PERIKSA NAMA PEMILIK</button>

    <div id="hasil-box">Menunggu Input...</div>
</div>

<script>
async function cekRekening() {
    const bank = document.getElementById('bank').value;
    const norek = document.getElementById('accNo') || document.getElementById('norek'); // Menyesuaikan ID
    const box = document.getElementById('hasil-box');

    if(!norek.value) return alert("Masukkan nomor rekening!");

    box.innerHTML = "<span style='color:#1a73e8'>Menghubungkan ke Bank...</span>";

    // DATA PREMIUM LO
    const KEY = "aFVBKbUGW15JPwN3to5L7DiyN0QY1syLI4p4jVQ5N0VnsgYHRs";
    
    // Berdasarkan link yang lo kasih, ini endpoint Inquiry untuk nama FULL
    const URL = `https://use.api.co.id/v1/bank/inquiry?bank_code=${bank}&account_number=${norek.value}`;

    try {
        const response = await fetch(URL, {
            method: 'GET',
            headers: {
                'x-api-co-id': KEY,
                'Accept': 'application/json'
            }
        });

        const data = await response.json();

        if (data.status === "success" || data.success === true) {
            // Karena status lo PREMIUM, data.account_name akan keluar tanpa sensor
            const nama = data.data.account_name || data.data.name;
            box.innerHTML = `NAMA PEMILIK:<br><span class="nama-full">${nama}</span>`;
        } else {
            // Jika saldo habis, bank gangguan, atau nomor salah
            box.innerHTML = `<span style="color:#d93025">GAGAL: ${data.message}</span>`;
        }
    } catch (error) {
        // Ini muncul kalau kena blokir CORS (solusinya: upload ke hosting atau aktifkan ekstensi CORS)
        box.innerHTML = "<span style='color:#d93025'>ERROR KONEKSI!<br><small>Pastikan file ini dibuka dari server atau pakai ekstensi CORS Unblock.</small></span>";
    }
}
</script>

</body>
</html>
