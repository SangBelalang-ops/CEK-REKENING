<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Tersnacks Check</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; display: flex; justify-content: center; padding-top: 50px; }
        .box { background: #111; border: 2px solid #ff0000; padding: 25px; border-radius: 15px; width: 320px; box-shadow: 0 0 15px #ff0000; }
        h2 { color: #ff0000; text-align: center; text-transform: uppercase; margin-bottom: 20px; }
        select, input, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 5px; border: 1px solid #333; box-sizing: border-box; }
        select, input { background: #222; color: #fff; }
        button { background: #ff0000; color: #fff; border: none; font-weight: bold; cursor: pointer; }
        #result { margin-top: 15px; text-align: center; border-top: 1px solid #333; padding-top: 15px; font-weight: bold; }
    </style>
</head>
<body>

<div class="box">
    <h2>CEK REKENING</h2>
    
    <select id="bankCode">
        <option value="">-- PILIH BANK --</option>
        <option value="bca">BCA</option>
        <option value="mandiri">MANDIRI</option>
        <option value="bri">BRI</option>
        <option value="bni">BNI</option>
        <option value="seabank">SEABANK</option>
        <option value="dana">DANA</option>
        <option value="ovo">OVO</option>
        <option value="gopay">GOPAY</option>
    </select>

    <input type="text" id="accNumber" placeholder="Nomor Rekening / HP">
    
    <button onclick="cekRekening()">CEK SEKARANG</button>

    <div id="result">Hasil muncul di sini...</div>
</div>

<script>
    async function cekRekening() {
        const bank = document.getElementById('bankCode').value;
        const norek = document.getElementById('accNumber').value;
        const hasil = document.getElementById('result');
        
        // Key Sakti lo
        const API_KEY = "aFVBKbUGW15JPwN3to5L7DiyN0QY1syLI4p4jVQ5N0VnsgYHRs"; 
        const BASE_URL = "https://use.api.co.id/validation/bank";

        if(!bank || !norek) return alert("Pilih Bank & Isi Nomor Rekening!");

        hasil.innerHTML = "<span style='color:cyan'>Lagi dicek...</span>";

        // TRIK: Kita tembak nama "Cek" secara otomatis biar API mau jawab
        const params = new URLSearchParams({
            bank_code: bank,
            account_number: norek,
            account_name: "Cek" 
        });

        try {
            const response = await fetch(`${BASE_URL}?${params.toString()}`, {
                method: 'GET',
                headers: { 'x-api-co-id': API_KEY }
            });

            const res = await response.json();

            // API Validation tetep ngasih field 'name' kalau rekening ketemu
            if (res.name) {
                hasil.innerHTML = `NAMA PEMILIK:<br><span style="color:#00ff00; font-size:20px;">${res.name.toUpperCase()}</span>`;
            } else {
                hasil.innerHTML = `<span style='color:#ffae00;'>${res.message || "Gak Ketemu!"}</span>`;
            }
        } catch (err) {
            hasil.innerHTML = "<span style='color:red'>Server Error!</span>";
        }
    }
</script>

</body>
</html>
