<!DOCTYPE html>
<html>
<head>
    <title>CEK REKENING INTERNAL</title>
    <style>
        body { background: #121212; color: white; font-family: sans-serif; display: flex; justify-content: center; padding-top: 50px; }
        .box { background: #1e1e1e; padding: 20px; border-radius: 10px; width: 350px; border: 1px solid #333; }
        select, input, button { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 5px; border: none; box-sizing: border-box; }
        button { background: #f39c12; color: black; font-weight: bold; cursor: pointer; }
        #hasil { margin-top: 20px; padding: 15px; background: #222; border-left: 5px solid #f39c12; min-height: 50px; word-break: break-all; }
    </style>
</head>
<body>
    <div class="box">
        <h2 style="text-align: center; color: #f39c12;">CEK REKENING BOSKU</h2>
        
        <label>Pilih Bank:</label>
        <select id="bank">
            <option value="bca">BCA</option>
            <option value="mandiri">MANDIRI</option>
            <option value="bni">BNI</option>
            <option value="bri">BRI</option>
            <option value="cimb">CIMB NIAGA</option>
            <option value="danamon">DANAMON</option>
        </select>

        <label>Nomor Rekening:</label>
        <input type="number" id="norek" placeholder="Tempel No Rek di sini...">
        
        <button onclick="gasCek()">CEK SEKARANG</button>

        <div id="hasil">Hasil bakal muncul di sini...</div>
    </div>

    <script>
        async function gasCek() {
            const bank = document.getElementById('bank').value;
            const norek = document.getElementById('norek').value;
            const display = document.getElementById('hasil');

            if(!norek) return alert("Noreknya mana, Bujang?");

            display.innerText = "Sabar... lagi diintip...";

            try {
                // Kita pake API publik yang gratis (Bifrost/Epay)
                const response = await fetch(`https://api-rekening.com/api/cek-rekening?bank=${bank}&account=${norek}`);
                const data = await response.json();

                if(data.status === true || data.status === "success") {
                    display.innerHTML = `
                        <span style="color: #f39c12; font-size: 0.8em;">NAMA PEMILIK:</span><br>
                        <b style="font-size: 1.2em;">${data.data.name || data.data.account_name}</b>
                    `;
                } else {
                    display.innerText = "Gagal: Rekening nggak ketemu atau API lagi limit.";
                }
            } catch (err) {
                display.innerText = "Error: Koneksi internet atau API lagi down.";
            }
        }
    </script>
</body>
</html>
