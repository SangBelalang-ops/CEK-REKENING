<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CekRek - Validasi Rekening Bank</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">

    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold text-blue-600">CekRek</h1>
            <p class="text-gray-500 text-sm">Validasi nomor rekening bank Indonesia</p>
        </div>

        <!-- Form -->
        <div class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Pilih Bank</label>
                <select id="bankCode" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                    <option value="bca">BCA</option>
                    <option value="bni">BNI</option>
                    <option value="bri">BRI</option>
                    <option value="mandiri">MANDIRI</option>
                    <option value="cimb">CIMB NIAGA</option>
                    <option value="permata">PERMATA</option>
                </select>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Nomor Rekening</label>
                <input type="number" id="accountNumber" placeholder="Contoh: 12345678" 
                    class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
            </div>

            <button onclick="validateAccount()" id="btnCheck" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-lg transition duration-200">
                <i class="fas fa-search mr-2"></i> Periksa Rekening
            </button>
        </div>

        <!-- Loading Spinner (Hidden by default) -->
        <div id="loading" class="hidden mt-6 text-center">
            <div class="animate-spin inline-block w-8 h-8 border-4 border-blue-500 border-t-transparent rounded-full"></div>
            <p class="text-sm text-gray-500 mt-2">Sedang mengecek...</p>
        </div>

        <!-- Result Area -->
        <div id="result" class="hidden mt-6 p-4 rounded-lg border">
            <!-- Content will be injected here -->
        </div>

        <div class="mt-8 text-center text-xs text-gray-400">
            &copy; 2024 CekRek Tool - Simple & Secure
        </div>
    </div>

    <script>
        async function validateAccount() {
            const bankCode = document.getElementById('bankCode').value;
            const accountNumber = document.getElementById('accountNumber').value;
            const btnCheck = document.getElementById('btnCheck');
            const loading = document.getElementById('loading');
            const resultDiv = document.getElementById('result');

            if (!accountNumber) {
                alert("Masukkan nomor rekening terlebih dahulu!");
                return;
            }

            // UI State: Loading
            btnCheck.disabled = true;
            loading.classList.remove('hidden');
            resultDiv.classList.add('hidden');

            try {
                // Kita menggunakan API Publik dari api-rekening.id (Free Tier)
                // Catatan: Jika API ini limit, Anda bisa menggantinya dengan API lain
                const response = await fetch(`https://api-rekening.id/v1/wallet/check-bank?bankCode=${bankCode}&accountNumber=${accountNumber}`);
                const data = await response.json();

                loading.classList.add('hidden');
                btnCheck.disabled = false;
                resultDiv.classList.remove('hidden');

                if (data.status === "200" || data.status === 200) {
                    // Berhasil ditemukan
                    resultDiv.classList.remove('border-red-200', 'bg-red-50');
                    resultDiv.classList.add('border-green-200', 'bg-green-50');
                    resultDiv.innerHTML = `
                        <div class="text-center">
                            <i class="fas fa-check-circle text-green-500 text-3xl mb-2"></i>
                            <p class="text-sm text-gray-600">Nama Pemilik:</p>
                            <h3 class="text-lg font-bold text-gray-800 uppercase">${data.data.accountName}</h3>
                            <p class="text-xs text-green-600 mt-1">Rekening Valid</p>
                        </div>
                    `;
                } else {
                    // Tidak ditemukan / Error
                    throw new Error(data.message || "Data tidak ditemukan");
                }

            } catch (error) {
                loading.classList.add('hidden');
                btnCheck.disabled = false;
                resultDiv.classList.remove('hidden', 'border-green-200', 'bg-green-50');
                resultDiv.classList.add('border-red-200', 'bg-red-50');
                resultDiv.innerHTML = `
                    <div c
