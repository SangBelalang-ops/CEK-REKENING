<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tersnacks Iklan Orbit Petir - New Arrivals</title>
    <style>
        body {
            font-family: 'Arial Black', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #1a1a1a; 
            overflow: hidden;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            animation: bg-lightning 5s infinite;
        }

        @keyframes bg-lightning {
            0%, 95%, 98% { background-color: #1a1a1a; }
            96%, 99% { background-color: #222; }
        }

        .ad-system-container {
            position: relative;
            width: 600px;
            height: 600px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .central-display {
            width: 280px;
            text-align: center;
            position: relative;
            z-index: 10;
        }

        .logo-top {
            width: 120px;
            margin-bottom: 15px;
            cursor: pointer;
            filter: drop-shadow(0 0 10px rgba(255,165,0,0.8));
        }

        .image-wrapper {
            width: 220px;
            height: 220px;
            margin: 0 auto 15px;
            overflow: hidden;
            border-radius: 12px;
            border: 4px solid #ffc107;
            background-image: url('https://i.postimg.cc/x1yD1PBH/e5f0873b-c76b-4312-88bc-3bd67981a550.gif');
            background-size: cover;
            background-position: center;
            position: relative;
            box-shadow: 0 0 20px rgba(255, 193, 7, 0.5);
            animation: electric-glow 0.2s infinite alternate;
        }

        @keyframes electric-glow {
            0% { border-color: #ffc107; box-shadow: 0 0 10px #ffc107; }
            100% { border-color: #fff; box-shadow: 0 0 25px #00e5ff, 0 0 10px #fff; }
        }

        .promo-tag {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(255, 0, 0, 0.9);
            color: white;
            font-weight: bold;
            padding: 6px;
            font-size: 0.9em;
            text-transform: uppercase;
            animation: blink-red 0.5s infinite;
        }

        .central-price {
            font-size: 36px;
            color: #00ff00;
            margin: 0;
            text-shadow: 0 0 15px rgba(0,255,0,0.7);
        }

        .central-product-name {
            font-size: 1em;
            margin: 5px 0 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: opacity 0.4s ease-in-out; 
            text-shadow: 2px 2px 4px #000;
            min-height: 1.2em;
        }
        
        .fade-out { opacity: 0; }

        .btn-beli {
            display: inline-block;
            background-color: #ff4500;
            color: white;
            text-decoration: none;
            padding: 10px 25px;
            border-radius: 50px;
            font-size: 0.9em;
            font-weight: bold;
            border: 2px solid #fff;
            animation: btn-flash 0.8s infinite;
        }

        /* ORBIT SYSTEM */
        .orbit-container {
            position: absolute;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            border: 1px dashed rgba(0, 229, 255, 0.3);
            animation: orbit-rotate 25s linear infinite;
        }

        .orbit-item {
            position: absolute;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background-color: white;
            border: 3px solid #ffc107;
            overflow: hidden;
            transform: translate(-50%, -50%);
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .orbit-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .orbit-item.highlight {
            transform: translate(-50%, -50%) scale(1.6);
            z-index: 20;
            box-shadow: 0 0 30px #00e5ff, 0 0 10px #fff;
            border-color: #00e5ff;
        }

        @keyframes blink-red {
            0%, 100% { background: #ff0000; }
            50% { background: #ffc107; color: #000; }
        }

        @keyframes btn-flash {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        @keyframes orbit-rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="ad-system-container">
        <div id="orbit-ring" class="orbit-container"></div>

        <div class="central-display">
            <a href="https://tersnacks.pages.dev" target="_blank">
                <img src="https://i.postimg.cc/hGYqktH0/download.png" class="logo-top" alt="Logo">
            </a>

            <div class="image-wrapper">
                <div class="promo-tag">NEW ARRIVAL!</div>
            </div>

            <div class="central-info">
                <div class="central-price">3$</div>
                <div id="central-product-name" class="central-product-name">LOADING...</div>
                
                <a href="https://tersnacks.pages.dev" target="_blank" class="btn-beli">
                    ORDER SEKARANG
                </a>
            </div>
        </div>
    </div>

    <script>
        // DATA PRODUK BARU
        const products = [
            { id: 1, name: "KUE SUS KERING COKLAT", img: "https://i.postimg.cc/nLX3vcfH/5a308155-4a39-40bc-b5ff-6c53942c6446.jpg" },
            { id: 2, name: "KERIPIK BALADO PADANG", img: "https://i.postimg.cc/7LprzWcc/fc5d75bb-8868-4c74-80b9-289bc86bb0c1.jpg" },
            { id: 3, name: "KUE BAWANG", img: "https://i.postimg.cc/W496fRjy/1904dff8-56e9-48b2-83c4-57a376284b27.jpg" },
            { id: 4, name: "UNTIR UNTIR", img: "https://i.postimg.cc/3Rd6tFMx/09220392-ad87-478d-9fcf-0c67b1ba6cfb.jpg" },
            { id: 5, name: "BASRENG ORIGINAL", img: "https://i.postimg.cc/sxBMf8kX/3428ff40-8068-4717-baf3-0bc8ffe5ef7f.jpg" }
        ];

        let currentIndex = 0;
        const orbitRing = document.getElementById('orbit-ring');
        const centralNameEl = document.getElementById('central-product-name');

        // Render Orbit Items
        const totalItems = products.length;
        products.forEach((product, i) => {
            const angle = (i / totalItems) * Math.PI * 2;
            const radius = 250; 
            const x = 250 + radius * Math.cos(angle);
            const y = 250 + radius * Math.sin(angle);

            const orbitItem = document.createElement('div');
            orbitItem.className = 'orbit-item';
            orbitItem.id = `orbit-item-${i}`;
            orbitItem.style.left = `${x}px`;
            orbitItem.style.top = `${y}px`;
            
            const img = document.createElement('img');
            img.src = product.img;
            orbitItem.appendChild(img);

            orbitRing.appendChild(orbitItem);
        });

        function updateDisplay() {
            centralNameEl.classList.add('fade-out'); 

            setTimeout(() => {
                const product = products[currentIndex];
                centralNameEl.textContent = product.name; 
                centralNameEl.classList.remove('fade-out'); 

                document.querySelectorAll('.orbit-item').forEach(el => el.classList.remove('highlight'));
                
                const highlightItem = document.getElementById(`orbit-item-${currentIndex}`);
                if (highlightItem) {
                    highlightItem.classList.add('highlight');
                }

                currentIndex = (currentIndex + 1) % products.length;
            }, 400); 
        }

        updateDisplay();
        setInterval(updateDisplay, 3000); // Ganti produk tiap 3 detik
    </script>
</body>
</html>
