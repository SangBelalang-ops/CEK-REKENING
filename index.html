<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADMIN TOOLS | CEK REKENING</title>
    <style>
        :root { --primary: #f39c12; --bg: #0a0a0a; --card: #161616; --text: #eee; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', Arial, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: var(--card); padding: 30px; border-radius: 20px; width: 100%; max-width: 380px; border: 1px solid #333; box-shadow: 0 15px 35px rgba(0,0,0,0.7); }
        h2 { color: var(--primary); text-align: center; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 1px; }
        p { text-align: center; font-size: 0.7em; color: #666; margin-bottom: 25px; }
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 8px; font-size: 0.8em; color: #888; font-weight: bold; }
        select, input { width: 100%; padding: 14px; background: #222; border: 1px solid #444; color: #fff; border-radius: 10px; box-sizing: border-box; font-size: 1em; transition: 0.3s; }
        select:focus, input:focus { border-color: var(--primary); background: #282828; outline: none; }
        button { width: 100%; padding: 16px; background: var(--primary); color: #000; border: none; border-radius: 10px; font-weight: 900; cursor: pointer; margin-top: 10px; transition: 0.3s; text-transform: uppercase; }
        button:hover { background: #e67e22; transform: translateY(-2px); }
        #hasil { margin-top: 25px; padding: 20px; background: #000; border-radius: 12px; min-height: 70px; text-align: center; border: 1px dashed #444; display: flex; flex-direction: column; justify-content: center; }
        .nama-display { color: var(--primary); font-size: 1.3em; font-weight: bold; line-height: 1.2; }
        .error-msg { color: #ff4444; font-size: 0.85em; }
        .loading-msg { color: #888; font-style: italic; font-size: 0.9em; }
    </style>
</head>
<body>

<div class="container">
    <h2>REK-FINDER</h2>
    <p>Internal Admin Tools v1.5</p>
    
    <div class="input-group">
        <label>PILIH BANK / E-WALLET</label>
        <select id="bank">
            <option value="bca">BCA</option>
            <option value="mandiri">MANDIRI</option>
            <option value="bni">BNI</option>
            <option value="bri">BRI</option>
            <option value="cimb">CIMB NIAGA</option>
            <option value="permata">PERMATA</option>
            <option value="danamon">DANAMON</option>
            <option value="gopay">GOPAY</option>
            <option value="dana">DANA</option>
            <option value="ovo">OVO</option>
        </select>
    </div>

    <div class="input-group">
        <label>NOMOR REKENING / HP</label>
        <input type="number" id="norek" placeholder="Input angka saja..." inputmode="numeric">
    </div>

    <button onclick="prosesCek()">CEK SEKARANG</button>

    <div id="hasil">
        <span style="color: #444; font-size: 0.9em;">Data akan muncul di sini...</span>
    </div>
</div>

<script>
async function prosesCek() {
    const bank = document.getElementById('bank').value;
    const norek = document.getElementById('norek').value;
    const display = document.getElementById('hasil');

    if (!norek || norek.length < 5) {
        alert("Norek minimal 5 digit, Bujang!");
        return;
    }

    display.innerHTML = '<span class="loading-msg">Mencari data ke server...</span>';

    // Link API Publik (Bifrost/Epay Proxy)
    const targetUrl = `https://api-rekening.com/api/cek-rekening?bank=${bank}&account=${norek}`;
    
    try {
        // Coba jalur langsung
        let response = await fetch(targetUrl);
        let data = await response.json();

        if (data.status === "success" || data.status === true) {
            renderNama(data.data.name || data.data.account_name);
        } else {
            throw new Error("Gagal Jalur Utama");
        }
    } catch (err) {
        // Jalur Cadangan kalau kena CORS atau Limit (Pakai Proxy AllOrigins)
        display.innerHTML = '<span class="loading-msg">Mencoba jalur aman...</span>';
        try {
            const proxy = `https://api.allorigins.win/get?url=${encodeURIComponent(targetUrl)}`;
            const resProxy = await fetch(proxy);
            const jsonProxy = await resProxy.json();
            const finalData = JSON.parse(jsonProxy.contents);

            if (finalData.status === "success" || finalData.status === true) {
                renderNama(finalData.data.name || finalData.data.account_name);
            } else {
                display.innerHTML = '<span class="error-msg">REKENING TIDAK DITEMUKAN<br><small>Pastikan bank & nomor benar.</small></span>';
            }
        } catch (e) {
            display.innerHTML = '<span class="error-msg">SERVER BUSY / LIMIT<br><small>Coba lagi dalam 5 menit.</small></span>';
        }
    }
}

function renderNama(nama) {
    const display = document.getElementById('hasil');
    display.innerHTML = `
        <div style="font-size: 0.7em; color: #888; margin-bottom: 5px; text-transform: uppercase;">Atas Nama:</div>
        <div class="nama-display">${nama}</div>
    `;
}
</script>

</body>
</html>
