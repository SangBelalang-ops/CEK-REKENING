<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validator Rekening Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center p-4">

    <div class="bg-white p-8 rounded-3xl shadow-xl w-full max-w-md border border-gray-200">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-black text-blue-700 uppercase tracking-tighter">Premium Checker</h1>
            <p class="text-gray-400 text-xs font-bold uppercase">Bank & E-Wallet Validator</p>
        </div>

        <div class="space-y-4">
            <div>
                <label class="text-[10px] font-bold text-gray-400 uppercase ml-2">Pilih Bank</label>
                <select id="bank" class="w-full p-4 bg-gray-50 border-none rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none font-semibold text-gray-700">
                    <option value="bca">BCA</option>
                    <option value="mandiri">Mandiri</option>
                    <option value="bni">BNI</option>
                    <option value="bri">BRI</option>
                    <option value="cimb">CIMB Niaga</option>
                    <option value="gopay">GoPay / Dana / OVO</option>
                </select>
            </div>

            <div>
                <label class="text-[10px] font-bold text-gray-400 uppercase ml-2">Nomor Rekening</label>
                <input type="number" id="account" placeholder="Contoh: 801234xxx" 
                    class="w-full p-4 bg-gray-50 border-none rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none font-bold text-lg">
            </div>

            <button onclick="mulaiCek()" id="btn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-black py-4 rounded-2xl transition-all shadow-lg shadow-blue-200">
                PERIKSA SEKARANG
            </button>
        </div>

        <!-- Loading -->
        <div id="loader" class="hidden mt-6 text-center animate-pulse">
            <div class="inline-block w-6 h-6 border-4 border-blue-600 border-t-transparent rounded-full animate-spin"></div>
            <p class="text-xs font-bold text-blue-600 mt-2">Menghubungi Server...</p>
        </div>

        <!-- Hasil -->
        <div id="boxHasil" class="hidden mt-8">
            <div class="p-6 rounded-3xl bg-blue-50 border border-blue-100 text-center">
                <p class="text-[10px] font-bold text-blue-400 uppercase mb-1">Nama Pemilik:</p>
                <h2 id="txtNama" class="text-2xl font-black text-blue-900 break-words"></h2>
            </div>
            
            <div class="mt-4 flex gap-3 p-4 bg-purple-50 rounded-2xl border border-purple-100">
                <i class="fas fa-robot text-purple-600 mt-1"></i>
                <p id="txtAi" class="text-xs text-purple-800 italic leading-relaxed"></p>
            </div>
        </div>
    </div>

    <script>
        async function mulaiCek() {
            const bank = document.getElementById('bank').value;
            const account = document.getElementById('account').value;
            const btn = document.getElementById('btn');
            const loader = document.getElementById('loader');
            const box = document.getElementById('boxHasil');

            if(!account) return alert("Masukkan nomor rekening!");

            // UI State
            btn.disabled = true;
            btn.opacity = "0.5";
            loader.classList.remove('hidden');
            box.classList.add('hidden');

            try {
                const response = await fetch(`api.php?bank=${bank}&account=${account}`);
                const res = await response.json();

                loader.classList.add('hidden');
                btn.disabled = false;

                if(res.success) {
                    box.classList.remove('hidden');
                    document.getElementById('txtNama').innerText = res.nama;
                    document.getElementById('txtAi').innerText = res.ai_analysis;
                } else {
                    alert("Gagal: Rekening tidak ditemukan atau salah kode bank.");
                }
            } catch (e) {
                alert("Error: Gagal koneksi ke api.php");
                btn.disabled = false;
                loader.classList.add('hidden');
            }
        }
    </script>
</body>
</html>
