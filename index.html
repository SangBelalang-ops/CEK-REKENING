<div style="background:#000; color:#fff; padding:20px; border:2px solid #ff0000; width:320px; border-radius:10px;">
    <h2 style="color:#ff0000; text-align:center;">CEK REKENING</h2>
    
    <select id="bankCode" style="width:100%; padding:10px; margin-bottom:10px;">
        <option value="">-- PILIH BANK / EWALLET --</option>
        <option value="bca">BCA</option>
        <option value="mandiri">MANDIRI</option>
        <option value="bri">BRI</option>
        <option value="bni">BNI</option>
        <option value="dana">DANA</option>
        <option value="ovo">OVO</option>
        <option value="gopay">GOPAY</option>
    </select>

    <input type="text" id="accNumber" placeholder="Nomor Rekening" style="width:93%; padding:10px; margin-bottom:10px;">
    <button onclick="cekRekening()" style="width:100%; padding:10px; background:#ff0000; color:#fff; border:none; font-weight:bold; cursor:pointer;">CEK SEKARANG</button>

    <div id="result" style="margin-top:15px; text-align:center;"></div>
</div>
