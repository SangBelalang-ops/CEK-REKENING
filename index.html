<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Checker - Validasi Rekening</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; }
    </style>
</head>
<body class="flex items-center justify-center p-4">

    <div class="glass p-8 rounded-3xl shadow-2xl w-full max-w-lg border border-white/20">
        <div class="text-center mb-8">
            <div class="bg-blue-600 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4 shadow-lg">
                <i class="fas fa-shield-check text-white text-3xl"></i>
            </div>
            <h1 class="text-3xl font-extrabold text-gray-800">CekRek <span class="text-blue-600 text-sm align-top font-normal tracking-widest border border-blue-600 px-2 rounded-full">PREMIUM</span></h1>
            <p class="text-gray-500 mt-2">Validasi Instan & Analisis Keamanan AI</p>
        </div>

        <!-- Input Form -->
        <div class="space-y-5">
            <div>
                <label class="block text-sm font-semibold text-gray-600 mb-2">Pilih Bank</label>
                <select id="bankCode" class="w-full p-3.5 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                    <option value="bca">BCA (Bank Central Asia)</option>
                    <option value="mandiri">Mandiri</option>
                    <option value="bni">BNI (Bank Negara Indonesia)</option>
                    <option value="bri">BRI (Bank Rakyat Indonesia)</option>
                    <option value="cimb">CIMB Niaga</option>
                    <option value="permata">Permata Bank</option>
                    <option value="danamon">Danamon</option>
                    <option value="bsi">BSI (Bank Syariah Indonesia)</option>
                    <option value="gopay">GoPay</option>
                    <option value="ovo">OVO</option>
                    <option value="dana">DANA</option>
                </select>
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-600 mb-2">Nomor Rekening / HP</label>
                <input type="number" id="accountNumber" placeholder="Masukkan nomor tanpa spasi..." 
                    class="w-full p-3.5 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition-all text-lg font-medium">
            </div>

            <button onclick="processValidation()" id="btnCheck" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl shadow-lg shadow-blue-200 transition duration-300 transform active:scale-95">
                <i class="fas fa-search-dollar mr-2"></i> PERIKSA SEKARANG
            </button>
        </div>

        <!-- Loading State -->
        <div id="loading" class="hidden mt-8 text-center animate-pulse">
            <div class="inline-block w-8 h-8 border-4 border-blue-600 border-t-transparent rounded-full animate-spin"></div>
            <p class="text-sm text-blue-600 font-medium mt-3">Menghubungi Server Perbankan...</p>
        </div>

        <!-- Result Area -->
        <div id="result" class="hidden mt-8 p-6 rounded-2xl border-2 transition-all duration-500">
            <!-- Data dari API akan muncul disini -->
        </div>

        <!-- AI Assistant Area -->
        <div id="aiAnalysis" class="hidden mt-4 p-4 bg-purple-50 rounded-2xl border border-purple-100">
            <div class="flex items-center mb-2">
                <i class="fas fa-robot text-purple-600 mr-2"></i>
                <span class="text-xs font-bold text-purple-700 tracking-wider uppercase">AI Security Analysis (Gemini)</span>
            </div>
            <p id="aiText" class="text-sm text-gray-700 leading-relaxed italic"></p>
        </div>
    </div>

    <script>
        // KONFIGURASI API KEY (Pindahkan ke backend jika untuk produksi)
        const API_KEY_COID = "xy9sQ9AcQwFZcNeiSTSrwZoEDGh9dsdW7e8IJ2GqAlgsb72oqX"; 
        const API_KEY_GEMINI = "AIzaSyDoC3xsK5VY8lLKlWgGkCKW7rooQvylORo";

        async function processValidation() {
            const bank = document.getElementById('bankCode').value;
            const account = document.getElementById('accountNumber').value;
            const btn = document.getElementById('btnCheck');
            const loader = document.getElementById('loading');
            const resDiv = document.getElementById('result');
            const aiDiv = document.getElementById('aiAnalysis');

            if (!account) return alert("Isi nomor rekening dulu bos!");

            // UI Reset
            btn.disabled = true;
            loader.classList.remove('hidden');
            resDiv.classList.add('hidden');
            aiDiv.classList.add('hidden');

            try {
                // 1. HIT API.CO.ID (Validasi Rekening)
                // Endpoint contoh: https://api.co.id/v1/bank/check (Sesuaikan dengan dokumentasi terbaru mereka)
                const response = await fetch(`https://api.co.id/v1/bank/check?bank=${bank}&no=${account}`, {
                    headers: { 'Authorization': `Bearer ${API_KEY_COID}` }
                });
                const data = await response.json();

                if (data.status === "success") {
                    showResult(true, data.data.name, bank, account);
                    // 2. HIT GEMINI API (Untuk Analisis AI)
                    getAiAnalysis(data.data.name, bank);
                } else {
                    showResult(false, null, bank, account);
                }
            } catch (err) {
                showResult(false, null, bank, account);
            } finally {
                btn.disabled = false;
                loader.classList.add('hidden');
            }
        }

        function showResult(success, name, bank, no) {
            const resDiv = document.getElementById('result');
            resDiv.classList.remove('hidden');
            
            if (success) {
                resDiv.className = "mt-8 p-6 rounded-2xl border-2 border-green-200 bg-green-50 shadow-inner";
                resDiv.innerHTML = `
                    <div class="text-center">
                        <div class="text-green-600 text-xs font-bold uppercase mb-1">Rekening Ditemukan</div>
                        <h2 class="text-2xl font-black text-gray-800 break-words">${name}</h2>
                        <div class="mt-3 flex justify-center gap-2">
                            <span class="px-3 py-1 bg-white rounded-full text-xs font-bold shadow-sm">${bank.toUpperCase()}</span>
                            <span class="px-3 py-1 bg-white rounded-full text-xs font-bold shadow-sm">${no}</span>
                        </div>
                    </div>
                `;
            } else {
                resDiv.className = "mt-8 p-6 rounded-2xl border-2 border-red-200 bg-red-50";
                resDiv.innerHTML = `<p class="text-center text-red-600 font-bold">Data tidak ditemukan. Pastikan nomor dan bank benar.</p>`;
            }
        }

        async function getAiAnalysis(name, bank) {
            const aiDiv = document.getElementById('aiAnalysis');
            const aiText = document.getElementById('aiText');
            
            try {
                const prompt = `Berikan tips singkat keamanan transaksi untuk rekening bank ${bank} atas nama ${name}. Maksimal 20 kata.`;
                const resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=${API_KEY_GEMINI}`, {
                    method: 'POST',
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });
                const aiData = await resp.json();
                const resultText = aiData.candidates[0].content.parts[0].text;
                
                aiDiv.classList.remove('hidden');
                aiText.innerText = resultText;
            } catch (e) {
                console.log("AI Error");
            }
        }
    </script>
</body>
</html>
